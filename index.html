<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The C# You Need to Know</title>
  <meta name="description" content="Free preview edition of The C# You Need to Know.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-html.css">
  <style>
    .language-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.875rem;
      margin-top: 1.75rem;
    }

    .language-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 3.5rem;
      padding: 0.75rem 1.25rem;
      border: 2px solid #0d6efd;
      border-radius: 0.75rem;
      background: #0d6efd;
      color: #fff;
      font-size: 1.075rem;
      font-weight: 650;
      line-height: 1.3;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 0.25rem 0.75rem rgba(13, 110, 253, 0.18);
      transition: background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .language-link:hover {
      border-color: #0a58ca;
      background: #0a58ca;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 0.5rem 1.125rem rgba(13, 110, 253, 0.24);
      transform: translateY(-2px);
    }

    .language-link:focus-visible {
      outline: 3px solid rgba(13, 110, 253, 0.3);
      outline-offset: 3px;
    }

    .more-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.875rem;
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid #dfe3e7;
    }

    .more-link {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      min-width: 0;
      padding: 1rem 1.125rem;
      border: 1px solid #dfe3e7;
      border-radius: 0.75rem;
      background: #fff;
      color: #212529;
      text-decoration: none;
      box-shadow: 0 0.125rem 0.5rem rgba(33, 37, 41, 0.06);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .more-link:hover {
      border-color: #6ea8fe;
      color: #0a58ca;
      text-decoration: none;
      box-shadow: 0 0.375rem 1rem rgba(13, 110, 253, 0.12);
      transform: translateY(-2px);
    }

    .more-link:focus-visible {
      outline: 3px solid rgba(13, 110, 253, 0.3);
      outline-offset: 2px;
    }

    .more-link__icon {
      display: grid;
      flex: 0 0 2.5rem;
      width: 2.5rem;
      height: 2.5rem;
      place-items: center;
      border-radius: 0.625rem;
      background: #e7f1ff;
      color: #0d6efd;
    }

    .more-link__icon svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    .more-link__text {
      min-width: 0;
    }

    .more-link__label,
    .more-link__title {
      display: block;
    }

    .more-link__label {
      margin-bottom: 0.1rem;
      color: #6c757d;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .more-link__title {
      overflow: hidden;
      font-weight: 650;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .more-link__arrow {
      flex: 0 0 auto;
      margin-left: auto;
      color: #6c757d;
      font-size: 1.125rem;
      transition: transform 160ms ease;
    }

    .more-link:hover .more-link__arrow {
      color: #0d6efd;
      transform: translateX(3px);
    }

    @media (max-width: 575.98px) {
      .language-links,
      .more-links {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .language-link,
      .more-link,
      .more-link__arrow {
        transition: none;
      }
    }
  </style>
</head>
<body class="quarto-light">
  <main class="content" style="max-width: 760px; margin: 4rem auto; padding: 0 1.25rem;">
    <h1>The C# You Need to Know (beta)</h1>
    <p>Free preview edition. Choose a language to start reading.</p>
    <nav class="language-links" aria-label="Choose a language">
      <a class="language-link" href="en/" lang="en">English</a>
      <a class="language-link" href="zh-tw/" lang="zh-Hant">繁體中文</a>
    </nav>
    <nav class="more-links" aria-label="More from Michael Tsai">
      <a class="more-link" href="https://huanlin.cc/">
        <span class="more-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18M12 3a14.5 14.5 0 0 1 0 18M12 3a14.5 14.5 0 0 0 0 18"></path>
          </svg>
        </span>
        <span class="more-link__text">
          <span class="more-link__label">AUTHOR WEBSITE</span>
          <span class="more-link__title">Michael Tsai</span>
        </span>
        <span class="more-link__arrow" aria-hidden="true">&#8594;</span>
      </a>
      <a class="more-link" href="https://www.huanlintalk.com/">
        <span class="more-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 4.5h10a2 2 0 0 1 2 2V19H7a2 2 0 0 1-2-2V4.5Z"></path>
            <path d="M7 19a2 2 0 0 1 2-2h10V6.5a2 2 0 0 0-2-2M9 9h5M9 12h5"></path>
          </svg>
        </span>
        <span class="more-link__text">
          <span class="more-link__label">BLOG</span>
          <span class="more-link__title">Huanlin 學習筆記</span>
        </span>
        <span class="more-link__arrow" aria-hidden="true">&#8594;</span>
      </a>
    </nav>
  </main>
</body>
</html>
